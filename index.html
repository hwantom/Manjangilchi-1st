        const Step = {
            LANDING: 0,
            PURPOSE: 1,
            COMPANION: 2,
            INTEREST: 3,
            PREFERENCE: 4,
            RECOMMENDATION: 5,
        };

        const TOTAL_STEPS = 4;

        // --- Service ---
        const parseCSV = (text) => {
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
            const rows = text.split('\n').filter(line => line.trim());
            const parsedRows = rows.map(line => {
                const parts = []; let current = ''; let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') { inQuote = !inQuote; continue; }
                    if (char === ',' && !inQuote) { parts.push(current.trim()); current = ''; continue; }
                    current += char;
                }
                parts.push(current.trim());
                return parts;
            });
            const cleaned = parsedRows.map(row => row.map(cell => cell.replace(/\r/g, '').trim()));
            const header = cleaned[0];
            if (!header) return [];
            return cleaned.slice(1).map(row => {
                const obj = {};
                header.forEach((h, i) => { obj[h] = row[i]; });
                return obj;
            });
        };

        const fetchStoreList = async () => {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rawData = parseCSV(text);
                if (!rawData.length) return [];
                const getVal = (row, keys) => {
                    for (const key of keys) {
                        const lowerKey = key.toLowerCase();
                        const actualKey = Object.keys(row).find(k => k.toLowerCase() === lowerKey);
                        if (actualKey && row[actualKey]) return row[actualKey].trim();
                    }
                    return "";
                };
                const stores = rawData.map(row => ({
                    name: getVal(row, ['name', '점포명']),
                    description: getVal(row, ['description', 'shortDesc', '설명']),
                    category: getVal(row, ['category', '분류'])
                })).filter(s => s.name);
                return stores;
            } catch (error) {
                console.error("Store list fetch failed:", error);
                return [];
            }
        };

        import { GoogleGenerativeAI } from '@google/generative-ai';

        const getRecommendations = async (selection, storeList, lang) => {
            // 1. 프롬프트 구성
            const storeListText = storeList.map(s => `${s.name}(${s.category})`).join(',');
            const prompt = `통인시장 상점목록: ${storeListText}
사용자: 목적-${selection.purpose}, 동행-${selection.companion}, 관심-${selection.interests.join(',')}, 선호-${selection.preference}
위 목록에서 가장 적합한 4곳을 골라 JSON으로 답해줘. 답변 언어: ${lang}. 형식: [{ "name": "상점명", "description": "한줄추천이유" }]`;

            try {
                // 2. Diagnostics
                console.log("Starting GEMINI call with model: gemini-2.5-flash");
                if (!AppConfig.GEMINI_API_KEY) throw new Error("GEMINI_API_KEY is missing in AppConfig");

                const genAI = new GoogleGenerativeAI(AppConfig.GEMINI_API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                // 3. JSON Parsing
                if (!text) {
                    throw new Error('AI 응답이 비어있습니다.');
                }

                const cleanedText = text.replace(/```json|```/g, "").trim();
                const parsed = JSON.parse(cleanedText);

                const items = parsed.map((item, index) => ({
                    id: `gen-${Date.now()}-${index}`,
                    name: item.name,
                    description: item.description,
                    checked: false
                }));

                return { data: items, error: "" };

            } catch (error) {
                console.error("Detailed Recommendation Error:", error);

                // Construct a very detailed error message for mobile debugging
                const diagnosticInfo = {
                    message: error.message,
                    name: error.name,
                    stack: error.stack ? error.stack.split('\n')[0] : 'N/A',
                    online: navigator.onLine,
                    model: "gemini-2.5-flash",
                    apiKeySnippet: AppConfig.GEMINI_API_KEY ? `${AppConfig.GEMINI_API_KEY.slice(0, 8)}...${AppConfig.GEMINI_API_KEY.slice(-4)}` : 'MISSING',
                    apiKeyPresent: !!AppConfig.GEMINI_API_KEY
                };

                let errorMsg = '추천을 불러오지 못했습니다.';
                if (error.message.includes('400')) errorMsg = '요청 오류(400). 모델명이 지원되지 않거나 키가 유효하지 않습니다.';
                else if (error.message.includes('403')) errorMsg = '권한 오류(403). API 키를 확인해주세요.';
                else if (error.message.includes('429')) errorMsg = '할당량 초과(429). 잠시 후 시도해주세요.';
                else if (error.message.includes('fetch')) errorMsg = '네트워크 연결 오류입니다.';

                return {
                    data: [],
                    error: `${errorMsg}\n\n[진단정보]\n- ${diagnosticInfo.message}\n- Online: ${diagnosticInfo.online}\n- Model: ${diagnosticInfo.model}\n- API Key: ${diagnosticInfo.apiKeySnippet}`
                };
            }
        };

        // --- Components ---

        const Layout = ({ children, step, totalSteps, title, showProgress = true, lang, setLang, onBack, showBackButton = false }) => {

                                        </svg>
                                    </button>
                                )}
                                <div className="text-gray-500 text-sm font-black uppercase tracking-widest">
                                    {showProgress && step > 0 && step <= totalSteps ? `Step ${step} / ${totalSteps}` : ''}
                                </div>

                                            >
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </header>

                        {showProgress && step > 0 && step <= totalSteps && (

                        )}

                    </div>

            `}

            );
        };

        const NextButton = ({ onClick, disabled = false, label = "다음", variant = 'secondary' }) => {
            const baseClasses = "w-full py-4 rounded-xl font-medium text-lg transition-colors";
            const variants = {
                primary: "bg-[#A68A64] text-white hover:bg-[#8D7350]",
                secondary: "bg-[#E6E0D4] text-gray-700 hover:bg-[#D9D1C1] disabled:opacity-50 disabled:cursor-not-allowed"
            };

            return (
                <div className="fixed bottom-0 w-full max-w-md bg-white px-6 pt-4 pb-[max(1.5rem,env(safe-area-inset-bottom))] border-t border-gray-50 left-0 right-0 mx-auto z-20">

                        onClick={onClick}
                        disabled={disabled}
                        className={`${baseClasses} ${variants[variant]}`}

                        {label}
                    </button>
                </div>
            );
        };

        const LandingCarousel = () => {
            const images = ['assets/slide1.jpg', 'assets/slide2.jpg', 'assets/slide3.jpg', 'assets/slide4.jpg'];
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentIndex((prev) => (prev + 1) % images.length);
                }, 4000);
                return () => clearInterval(interval);
            }, [images.length]);

            const nextSlide = (e) => {
                e.stopPropagation();
                setCurrentIndex((prev) => (prev + 1) % images.length);
            };

            const prevSlide = (e) => {
                e.stopPropagation();
                setCurrentIndex((prev) => (prev - 1 + images.length) % images.length);
            };

            return (
                <div className="w-full h-auto aspect-[4/3] max-h-[300px] bg-gray-100 rounded-3xl overflow-hidden shadow-sm relative group border border-gray-50">
                    <div
                        className="flex h-full transition-transform duration-1000 ease-in-out"
                        style={{ transform: `translateX(-${currentIndex * 100}%)` }}
                    >
                        {images.map((src, idx) => (
                            <img
                                key={idx}
                                src={src}
                                className="w-full h-full object-cover shrink-0"
                                alt={`Slide ${idx + 1}`}
                                onerror={`this.src='https://picsum.photos/800/600?grayscale&sig=${idx}'`}
                            />
                        ))}
                    </div>

                    {/* Arrows */}
                    <button
                        onClick={prevSlide}
                        className="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white opacity-0 group-hover:opacity-100 transition-opacity active:scale-90"
                    >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <button
                        onClick={nextSlide}
                        className="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md text-white opacity-0 group-hover:opacity-100 transition-opacity active:scale-90"
                    >
                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
                    </button>

                    {/* Indicators */}
                    <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5">
                        {images.map((_, idx) => (
                            <div
                                key={idx}
                                className={`h-1.5 rounded-full transition-all duration-300 ${idx === currentIndex ? 'w-4 bg-white' : 'w-1.5 bg-white/50'}`}
                            ></div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Main App Logic ---

        const App = () => {
            const [step, setStep] = useState(Step.LANDING);
            const [lang, setLang] = useState(localStorage.getItem('tongin_lang') || 'ko');

            const t = TRANSLATIONS[lang];

            // Update localStorage when lang changes
            useEffect(() => {
                localStorage.setItem('tongin_lang', lang);
            }, [lang]);

            const [loading, setLoading] = useState(false);
            const [recommendations, setRecommendations] = useState([]);
            const [storeList, setStoreList] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');

            // Loading State
            const [progress, setProgress] = useState(0);
            const [currentMessageIndex, setCurrentMessageIndex] = useState(0);

            const [selection, setSelection] = useState({
                purpose: '',
                companion: '',
                interests: [],
                preference: ''
            });

            const handleNext = () => setStep(prev => prev + 1);
            const handleBack = () => setStep(prev => Math.max(prev - 1, Step.LANDING));
            const handleReset = () => {
                setSelection({ purpose: '', companion: '', interests: [], preference: '' });
                setStep(Step.LANDING);
                setRecommendations([]);
            };

            const updateSelection = (field, value) => {
                setSelection(prev => ({ ...prev, [field]: value }));
            };

            const handleInterestToggle = (value) => {
                setSelection(prev => {
                    const current = prev.interests;
                    if (current.includes(value)) return { ...prev, interests: current.filter(i => i !== value) };
                    if (current.length >= 3) return prev;
                    return { ...prev, interests: [...current, value] };
                });
            };

            useEffect(() => {
                let mounted = true;
                fetchStoreList().then((list) => {
                    if (mounted) setStoreList(list);
                }).catch(() => {
                    if (mounted) setErrorMessage('데이터를 불러오지 못했습니다. 다시 시도해주세요.');
                });
                return () => { mounted = false; };
            }, []);

            // Loading Effect
            useEffect(() => {
                if (!loading) return;
                setProgress(0);
                setCurrentMessageIndex(0);

                const progressInterval = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 90) return prev;
                        const diff = Math.random() * 10;
                        return Math.min(prev + diff, 90);
                    });
                }, 500);

                const messageInterval = setInterval(() => {
                    setCurrentMessageIndex(prev => (prev + 1) % LOADING_MESSAGES[lang].length);
                }, 2500);

                return () => {
                    clearInterval(progressInterval);
                    clearInterval(messageInterval);
                };
            }, [loading, lang]);

            const fetchRecommendations = useCallback(async () => {
                setLoading(true);
                setErrorMessage('');
                setStep(Step.RECOMMENDATION);
                const result = await getRecommendations(selection, storeList, lang);
                if (result.error) {
                    setRecommendations([]);
                    setErrorMessage(result.error);
                } else {
                    setRecommendations(result.data);
                }
                setLoading(false);
            }, [selection, storeList, lang]);

            // Rendering helpers
            const renderLanding = () => (
                <div className="flex flex-col py-8 space-y-10">
                    <div className="space-y-2">
                        <h1 className="text-3xl font-normal text-gray-900 leading-tight">{t.title}</h1>
                        <p className="text-[#A68A64] font-bold text-sm tracking-wider">{t.subTitle}</p>
                    </div>

                    <LandingCarousel />

                    <div className="space-y-4">
                        <h2 className="text-2xl font-normal text-gray-800 whitespace-pre-wrap leading-tight">{t.landingTitle}</h2>
                        <p className="text-gray-500 text-base leading-relaxed">{t.landingDesc}</p>
                    </div>

                    <div className="space-y-4 pt-4">
                        <button onClick={handleNext} className="w-full py-5 bg-[#A68A64] text-white rounded-2xl font-bold text-lg shadow-lg active:scale-[0.98] transition-all">
                            {t.btnRec}
                        </button>
                        <button
                            onClick={() => { window.location.href = `map.html`; }}
                            className="w-full py-4 text-gray-400 font-semibold text-base hover:bg-gray-50 rounded-2xl transition-colors"
                        >
                            {t.btnMap}
                        </button>
                    </div>
                </div>
            );

            const renderStep1 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step1Title}</h2>
                        <p className="text-gray-500 text-base">{t.step1Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step1Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.purpose === item.label} onClick={() => updateSelection('purpose', item.label)}>
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={!selection.purpose} label={t.next} />
                </div>
            );

            const renderStep2 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step2Title}</h2>
                        <p className="text-gray-500 text-base">{t.step2Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step2Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.companion === item.label} onClick={() => updateSelection('companion', item.label)}>
                                <div className={`mb-2 ${item.color || 'text-[#A68A64]'}`}>
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={!selection.companion} label={t.next} />
                </div>
            );

            const renderStep3 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step3Title}</h2>
                        <p className="text-gray-500 text-base">{t.step3Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step3Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.interests.includes(item.label)} onClick={() => handleInterestToggle(item.label)} className="aspect-[4/3]">
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={selection.interests.length === 0} label={t.next} />
                </div>
            );

            const renderStep4 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 leading-tight">{t.step4Title}</h2>
                        <p className="text-gray-500 text-base">{t.step4Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step4Opts.map((item) => (
                            <SelectionButton key={item.id} selected={selection.preference === item.id} onClick={() => { updateSelection('preference', item.id); fetchRecommendations(); }}>
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg text-center leading-tight">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                </div>
            );

            const renderRecommendation = () => {
                if (loading) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center px-6">
                            <div className="w-full max-w-[240px] mb-8 relative">
                                <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div
                                        className="h-full bg-[#A68A64] transition-all duration-500 ease-out"
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                                <p className="text-right text-xs text-[#A68A64] font-bold mt-2">{Math.round(progress)}%</p>
                            </div>
                            <h3 className="text-xl font-bold text-gray-800 mb-2 text-center animate-pulse">
                                {LOADING_MESSAGES[lang][currentMessageIndex]}
                            </h3>
                        </div>
                    );
                }

                if (errorMessage) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center space-y-4 text-center px-6">
                            <p className="text-gray-600">{t.recError}</p>
                            <button
                                onClick={fetchRecommendations}
                                className="px-5 py-2.5 rounded-lg bg-[#A68A64] text-white text-sm font-medium"
                            >
                                {t.recRetry}
                            </button>
                            {errorMessage && (
                                <div className="mt-8 p-4 bg-red-50 rounded-2xl border border-red-100">
                                    <p className="text-red-600 text-sm font-bold mb-2">Error Details</p>
                                    <pre className="text-red-500 text-[10px] leading-tight whitespace-pre-wrap break-all font-mono opacity-80">{errorMessage}</pre>
                                    <button
                                        onClick={fetchRecommendations}
                                        className="mt-4 w-full py-3 bg-red-100 text-red-700 rounded-xl font-bold text-sm active:scale-95 transition-all"
                                    >
                                        {t.recRetry}
                                    </button>
                                </div>
                            )}
                        </div>
                    );
                }

                const handleOpenMap = () => {
                    const selectedStores = recommendations.filter((store) => store.checked);

                    // Auto-Favorites Logic
                    try {
                        const currentFavs = new Set(JSON.parse(localStorage.getItem('tongin_favs') || '[]'));
                        recommendations.forEach(r => currentFavs.add(r.name));
                        localStorage.setItem('tongin_favs', JSON.stringify(Array.from(currentFavs)));
                    } catch (e) { console.error("Auto-fav failed", e); }

                    if (selectedStores.length === 0) {
                        // No selection - show first recommendation
                        const target = recommendations[0]?.name;
                        window.location.href = target ? `map.html?open=${encodeURIComponent(target)}` : 'map.html';
                        return;
                    } else if (selectedStores.length === 1) {
                        // Single selection - open detail panel
                        window.location.href = `map.html?open=${encodeURIComponent(selectedStores[0].name)}`;
                    } else {
                        // Multiple selections - show all on map
                        const names = selectedStores.map(s => s.name).join(',');
                        window.location.href = `map.html?highlight=${encodeURIComponent(names)}`;
                    }
                };

                return (
                    <div className="pt-4 pb-48">
                        <h2 className="text-2xl font-normal text-gray-900 mb-10 whitespace-pre-wrap leading-tight">{t.recTitle}</h2>
                        <div className="space-y-4">
                            {recommendations.map((store) => (
                                <div
                                    key={store.id}
                                    className="p-4 border border-gray-200 rounded-xl flex items-start gap-3 bg-white hover:border-[#A68A64] transition-colors cursor-pointer"
                                    onClick={() => setRecommendations(prev => prev.map(s => s.id === store.id ? { ...s, checked: !s.checked } : s))}
                                >
                                    <div className={`mt-1 w-5 h-5 rounded border flex items-center justify-center flex-shrink-0 ${store.checked ? 'bg-[#A68A64] border-[#A68A64]' : 'border-gray-300'}`}>
                                        {store.checked && <div className="w-2.5 h-2.5 bg-white rounded-sm" />}
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">[{store.name}]</h3>
                                        <p className="text-sm text-gray-500 leading-relaxed">{store.description}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white px-6 pt-4 pb-[max(1.5rem,env(safe-area-inset-bottom))] border-t border-gray-50 space-y-3 z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                            <button
                                onClick={handleOpenMap}
                                className="w-full py-4 bg-[#A68A64] text-white rounded-2xl font-bold text-lg shadow-md active:scale-[0.98] transition-all"
                            >
                                {(() => {
                                    const selectedCount = recommendations.filter(r => r.checked).length;
                                    if (selectedCount === 0) return t.recMapBtn;
                                    if (selectedCount === 1) return t.recMapBtn;
                                    return `선택한 ${selectedCount}개 점포 지도에서 보기`;
                                })()}
                            </button>
                            <button onClick={handleReset} className="w-full py-4 text-gray-400 font-semibold text-sm hover:text-gray-600 transition-colors uppercase tracking-widest">{t.recResetBtn}</button>
                        </div>
                    </div>
                );
            };

            return (
                <Layout
                    step={step}
                    totalSteps={TOTAL_STEPS}
                    title={step === Step.LANDING ? t.title : undefined}
                    showProgress={step !== Step.LANDING && step !== Step.RECOMMENDATION}
                    lang={lang}
                    setLang={setLang}
                    onBack={handleBack}
                    showBackButton={step > Step.LANDING && step < Step.RECOMMENDATION}
                >
                    {step === Step.LANDING && renderLanding()}
                    {step === Step.PURPOSE && renderStep1()}
                    {step === Step.COMPANION && renderStep2()}
                    {step === Step.INTEREST && renderStep3()}
                    {step === Step.PREFERENCE && renderStep4()}
                    {step === Step.RECOMMENDATION && renderRecommendation()}
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
