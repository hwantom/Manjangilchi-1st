        const Step = {
            LANDING: 0,
            PURPOSE: 1,
            COMPANION: 2,
            INTEREST: 3,
            PREFERENCE: 4,
            RECOMMENDATION: 5,
        };

        const TOTAL_STEPS = 4;

        // --- Service ---
        const parseCSV = (text) => {
            if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
            const rows = text.split('\n').filter(line => line.trim());
            const parsedRows = rows.map(line => {
                const parts = []; let current = ''; let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') { inQuote = !inQuote; continue; }
                    if (char === ',' && !inQuote) { parts.push(current.trim()); current = ''; continue; }
                    current += char;
                }
                parts.push(current.trim());
                return parts;
            });
            const cleaned = parsedRows.map(row => row.map(cell => cell.replace(/\r/g, '').trim()));
            const header = cleaned[0];
            if (!header) return [];
            return cleaned.slice(1).map(row => {
                const obj = {};
                header.forEach((h, i) => { obj[h] = row[i]; });
                return obj;
            });
        };

        const fetchStoreList = async () => {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rawData = parseCSV(text);
                if (!rawData.length) return [];
                const getVal = (row, keys) => {
                    for (const key of keys) {
                        const lowerKey = key.toLowerCase();
                        const actualKey = Object.keys(row).find(k => k.toLowerCase() === lowerKey);
                        if (actualKey && row[actualKey]) return row[actualKey].trim();
                    }
                    return "";
                };
                const seen = new Set();
                const stores = rawData.map(row => ({
                    name: getVal(row, ['name', '점포명']),
                    description: getVal(row, ['description', 'shortDesc', '설명']),
                    category: getVal(row, ['category', '분류']),
                    slug: getVal(row, ['slug', '슬러그'])
                })).filter(s => s.name).filter(s => {
                    if (seen.has(s.name)) return false;
                    seen.add(s.name);
                    return true;
                });
                return stores;
            } catch (error) {
                console.error("Store list fetch failed:", error);
                return [];
            }
        };

        import { GoogleGenerativeAI } from '@google/generative-ai';

        const getRecommendations = async (selection, storeList, lang) => {
            // 1. 프롬프트 구성
            const storeListText = storeList.map(s => `${s.name}(${s.category})`).join(',');
            const prompt = `통인시장 상점목록: ${storeListText}
사용자: 목적-${selection.purpose}, 동행-${selection.companion}, 관심-${selection.interests.join(',')}, 선호-${selection.preference}
위 목록에서 가장 적합한 4곳을 골라 JSON으로 답해줘. 답변 언어: ${lang}. 형식: [{ "name": "상점명", "description": "한줄추천이유" }]`;

            try {
                // 2. Diagnostics
                if (!AppConfig.GEMINI_API_KEY) throw new Error("GEMINI_API_KEY is missing in AppConfig");

                const genAI = new GoogleGenerativeAI(AppConfig.GEMINI_API_KEY);

                // 모델 우선순위: gemini-2.5-flash → gemini-1.5-flash (폴백)
                const MODELS = ["gemini-2.5-flash-preview-05-20", "gemini-2.5-flash", "gemini-1.5-flash"];
                let text = null;
                let lastError = null;

                for (const modelName of MODELS) {
                    try {
                        console.log("Trying GEMINI model:", modelName);
                        const model = genAI.getGenerativeModel({ model: modelName });
                        const result = await model.generateContent(prompt);
                        const response = await result.response;
                        text = response.text();
                        if (text) {
                            console.log("Success with model:", modelName);
                            break;
                        }
                    } catch (modelErr) {
                        console.warn(`Model ${modelName} failed:`, modelErr.message);
                        lastError = modelErr;
                    }
                }

                if (!text) {
                    throw lastError || new Error('모든 모델에서 응답을 받지 못했습니다.');
                }

                // 3. JSON Parsing
                const cleanedText = text.replace(/```json|```/g, "").trim();
                const parsed = JSON.parse(cleanedText);

                const items = parsed.map((item, index) => {
                    const matchedStore = storeList.find(s => s.name === item.name);
                    return {
                        id: `gen-${Date.now()}-${index}`,
                        name: item.name,
                        description: item.description,
                        slug: matchedStore ? matchedStore.slug : null,
                        checked: false
                    };
                });

                return { data: items, error: "" };

            } catch (error) {
                console.error("Detailed Recommendation Error:", error);

                const diagnosticInfo = {
                    message: error.message,
                    name: error.name,
                    online: navigator.onLine,
                    apiKeySnippet: AppConfig.GEMINI_API_KEY ? `${AppConfig.GEMINI_API_KEY.slice(0, 8)}...${AppConfig.GEMINI_API_KEY.slice(-4)}` : 'MISSING',
                    apiKeyPresent: !!AppConfig.GEMINI_API_KEY
                };

                let errorMsg = '추천을 불러오지 못했습니다.';
                if (error.message.includes('400')) errorMsg = '요청 오류(400). 모델명이 지원되지 않거나 키가 유효하지 않습니다.';
                else if (error.message.includes('403')) errorMsg = '권한 오류(403). API 키를 확인해주세요.';
                else if (error.message.includes('429')) errorMsg = '할당량 초과(429). 잠시 후 시도해주세요.';
                else if (error.message.includes('fetch')) errorMsg = '네트워크 연결 오류입니다.';

                return {
                    data: [],
                    error: `${errorMsg}\n\n[진단정보]\n- ${diagnosticInfo.message}\n- Online: ${diagnosticInfo.online}\n- API Key: ${diagnosticInfo.apiKeySnippet}`
                };
            }
        };

        // --- Components ---

        const Layout = ({ children, step, totalSteps, title, showProgress = true, lang, setLang, onBack, showBackButton = false }) => {

                                        </svg>
                                    </button>
                                )}
                                {step === 0 ? (
                                    <div className="flex items-center gap-2">
                                        <img src="assets/mjlogo.png" alt="만장일치 로고" className="w-[1.2rem] mt-0.5 h-auto object-contain" />
                                        <span className="text-[21px] text-gray-900 leading-none outline-none mt-1" style={{ fontFamily: 'Jandari', fontWeight: 'normal' }}>{title || '만장일치'}</span>
                                    </div>
                                ) : (
                                    <div className="text-gray-500 text-sm font-black uppercase tracking-widest">
                                        {showProgress && step > 0 && step <= totalSteps ? `Step ${step} / ${totalSteps}` : ''}
                                    </div>
                                )}
                            </div>

                            <div className="relative">
                                <button onClick={toggleMenu} className="p-1 rounded-full hover:bg-gray-100 transition-colors">
                                    <Globe className="text-[#A68A64] w-6 h-6" />
                                </button>

                                {isMenuOpen && (
                                    <div className="absolute right-0 top-full mt-2 w-32 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-50">
                                        {Object.entries(langLabels).map(([key, label]) => (
                                            <button
                                                key={key}
                                                onClick={() => changeLang(key)}
                                                className={`w-full text-left px-4 py-3 text-sm font-medium hover:bg-gray-50 transition-colors ${lang === key ? 'text-[#A68A64] bg-[#FDFBF7]' : 'text-gray-600'}`}
                                            >
                                                {label}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </header>

                        {showProgress && step > 0 && step <= totalSteps && (
                            <div className="px-6 pb-6">
                                <div className="h-1.5 w-full bg-gray-200 rounded-full overflow-hidden">
                                    <div
                                        className={`h-full bg-[#A68A64] transition-all duration-300 ease-out`}
                                        style={{ width: `${progressPercentage}%` }}
                                    ></div>
                                </div>
                            </div>
                        )}

                        <main className="flex-1 px-6 pb-32 overflow-y-auto no-scrollbar">
                            {children}
                        </main>
                    </div>
                </div>
            );
        };

        const SelectionButton = ({ selected, onClick, children, className = "" }) => {
            return (
                <button
                    onClick={onClick}
                    className={`
              w-full aspect-square flex flex-col items-center justify-center rounded-2xl border transition-all duration-200
              ${selected
                            ? 'border-[#A68A64] bg-[#FDFBF7] text-[#A68A64] ring-1 ring-[#A68A64]'

                        }
              ${className}
            `}
                >
                    {children}
                </button>
            );
        };

        const NextButton = ({ onClick, disabled = false, label = "다음", variant = 'secondary' }) => {
            const baseClasses = "w-full py-4 rounded-xl font-medium text-lg transition-colors";
            const variants = {
                primary: "bg-[#A68A64] text-white hover:bg-[#8D7350]",
                secondary: "bg-[#E6E0D4] text-gray-700 hover:bg-[#D9D1C1] disabled:opacity-50 disabled:cursor-not-allowed"
            };

            return (
                <div className="fixed bottom-0 w-full max-w-md bg-white px-6 pt-4 pb-[max(1.5rem,env(safe-area-inset-bottom))] border-t border-gray-50 left-0 right-0 mx-auto z-20">
                    <button
                        onClick={onClick}
                        disabled={disabled}
                        className={`${baseClasses} ${variants[variant]}`}
                    >
                        {label}
                    </button>
                </div>
            );
        };

        const LandingCarousel = () => {
            const images = ['assets/slide1.jpg', 'assets/slide2.jpg', 'assets/slide3.jpg', 'assets/slide4.jpg'];
            const extendedImages = [images[images.length - 1], ...images, images[0]];
            const scrollContainerRef = React.useRef(null);

            useEffect(() => {
                const container = scrollContainerRef.current;
                if (!container) return;

                const initScroll = () => {
                    if (container.clientWidth > 0) {
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = container.clientWidth;
                        container.style.scrollBehavior = "smooth";
                    }
                };
                
                requestAnimationFrame(initScroll);

                let isFixing = false;
                const handleScroll = () => {
                    if (isFixing) return;
                    const width = container.clientWidth;
                    const scrollLeft = container.scrollLeft;
                    
                    if (width === 0) return;
                    
                    const maxScroll = width * (extendedImages.length - 1);
                    
                    if (scrollLeft <= 5) {
                        isFixing = true;
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = width * images.length;
                        requestAnimationFrame(() => {
                            container.style.scrollBehavior = "smooth";
                            isFixing = false; 
                        });
                    } else if (scrollLeft >= maxScroll - 5) {
                        isFixing = true;
                        container.style.scrollBehavior = 'auto';
                        container.scrollLeft = width;
                        requestAnimationFrame(() => {
                            container.style.scrollBehavior = "smooth";
                            isFixing = false; 
                        });
                    }
                };

                container.addEventListener('scroll', handleScroll, { passive: true });
                window.addEventListener('resize', initScroll);
                return () => {
                    container.removeEventListener('scroll', handleScroll);
                    window.removeEventListener('resize', initScroll);
                };
            }, []);

            return (
                <div className="w-full relative bg-gray-100 overflow-hidden">
                    <div
                        ref={scrollContainerRef}
                        className="flex w-full overflow-x-auto snap-x snap-mandatory no-scrollbar"

                                    className="w-full aspect-[4/3] object-cover"

            const currentData = data[step - 1];

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm transition-opacity">
                    <div className="w-full max-w-[310px] bg-[#FFFdf9] rounded-[24px] overflow-hidden shadow-2xl relative flex flex-col transition-all">

                                    <p className="text-[10px] text-[#A68A64] font-medium mb-1 tracking-wide">이용 가이드</p>
                                    <h2 className="text-[15px] font-bold text-gray-900 leading-tight">엽전 도시락 이용방법</h2>
                                </div>
                                <button onClick={onClose} className="w-[26px] h-[26px] flex items-center justify-center rounded-full bg-[#EAE5D9] text-[#7A6A58] hover:bg-[#E0DBCF] transition-colors active:scale-95 shadow-sm mt-0.5">
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                        </div>

                        <div className="w-full aspect-[3/2] bg-[#F4EBE0] relative flex items-center justify-center overflow-hidden">
                            <img src={`assets/coin_slide${step}.png`} alt={`이용 가이드 스텝 ${step}`} className="w-full h-full object-cover" />
                        </div>

                        <div className="px-5 pt-4 pb-4 flex-1 flex flex-col bg-[#FFFdf9]">
                            <div className="flex items-center gap-2 mb-3">
                                <div className="w-[22px] h-[22px] rounded-full bg-[#A88761] text-white flex items-center justify-center text-[10px] font-bold font-sans">
                                    {step}
                                </div>
                                <span className="text-[#BCA186] text-[11px] font-bold tracking-wide">STEP {step} / 4</span>
                            </div>

                            <h3 className="text-[18px] font-extrabold text-gray-900 mb-1.5 leading-none tracking-tight">{currentData.title}</h3>
                            <p className="text-[13px] text-[#555] mb-2.5 break-keep leading-snug">{currentData.desc}</p>

                            <div className="bg-[#f0eadd] rounded-[12px] p-3 mb-2.5 shadow-[inset_0_1px_3px_rgba(0,0,0,0.02)]">
                                <p className="text-[#8B6B4A] font-medium text-[12px] whitespace-pre-wrap leading-relaxed">
                                    {currentData.box}
                                </p>
                            </div>

                            <p className="text-[11px] text-[#A68A64] font-medium mb-4">
                                {currentData.note}
                            </p>

                            <div className="flex items-center justify-between mt-auto pt-1">
                                <div className="flex gap-1.5 items-center">
                                    {[1,2,3,4].map(idx => (
                                        <div key={idx} className={`h-[5px] rounded-full transition-all duration-300 ${step === idx ? 'w-[16px] bg-[#A88761]' : 'w-[5px] bg-[#D9CDB8]'}`}></div>
                                    ))}
                                </div>

                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => step > 1 && setStep(step - 1)}
                                        disabled={step === 1}
                                        className={`w-[36px] h-[36px] rounded-full flex items-center justify-center transition-all ${step === 1 ? 'bg-[#EAE5DB] text-[#D9CDB8] cursor-not-allowed' : 'bg-[#EAE5DB] text-[#8B6B4A] hover:bg-[#E0DBCF] active:scale-95'}`}
                                    >
                                        <svg className="w-[16px] h-[16px] pr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 19l-7-7 7-7" /></svg>
                                    </button>
                                    <button 
                                        onClick={() => step < 4 ? setStep(step + 1) : onClose()}
                                        className="w-[36px] h-[36px] rounded-full bg-[#A88761] flex items-center justify-center text-white hover:bg-[#96744E] transition-all active:scale-95 shadow-sm"
                                    >
                                        {step < 4 ? (
                                            <svg className="w-[16px] h-[16px] pl-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" /></svg>
                                        ) : (
                                            <svg className="w-[16px] h-[16px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Logic ---

        const App = () => {
            const [step, setStep] = useState(Step.LANDING);
            const [isGuideOpen, setIsGuideOpen] = useState(false);
            const [lang, setLang] = useState(localStorage.getItem('tongin_lang') || 'ko');

            const t = TRANSLATIONS[lang];

            // Update localStorage when lang changes
            useEffect(() => {
                localStorage.setItem('tongin_lang', lang);
            }, [lang]);

            const [loading, setLoading] = useState(false);
            const [recommendations, setRecommendations] = useState([]);
            const [storeList, setStoreList] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');

            // Loading State
            const [progress, setProgress] = useState(0);
            const [currentMessageIndex, setCurrentMessageIndex] = useState(0);

            const [selection, setSelection] = useState({
                purpose: '',
                companion: '',
                interests: [],
                preference: ''
            });

            const track = (eventName, params = {}) => {
                window.mjTrack?.(eventName, params);
            };

            const handleNext = () => setStep(prev => prev + 1);
            const handleBack = () => setStep(prev => Math.max(prev - 1, Step.LANDING));
            const handleReset = () => {
                setSelection({ purpose: '', companion: '', interests: [], preference: '' });
                setStep(Step.LANDING);
                setRecommendations([]);
            };

            const updateSelection = (field, value) => {
                track('recommendation_option_select', {
                    step_name: field,
                    option_value: Array.isArray(value) ? value.join('|') : value
                });
                setSelection(prev => ({ ...prev, [field]: value }));
            };

            const handleInterestToggle = (value) => {
                setSelection(prev => {
                    const current = prev.interests;
                    if (current.includes(value)) return { ...prev, interests: current.filter(i => i !== value) };
                    if (current.length >= 3) return prev;
                    return { ...prev, interests: [...current, value] };
                });
            };

            useEffect(() => {
                let mounted = true;
                fetchStoreList().then((list) => {
                    if (mounted) setStoreList(list);
                }).catch(() => {
                    if (mounted) setErrorMessage('데이터를 불러오지 못했습니다. 다시 시도해주세요.');
                });
                return () => { mounted = false; };
            }, []);

            // Loading Effect
            useEffect(() => {
                if (!loading) return;
                setProgress(0);
                setCurrentMessageIndex(0);

                const progressInterval = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 90) return prev;
                        const diff = Math.random() * 10;
                        return Math.min(prev + diff, 90);
                    });
                }, 500);

                const messageInterval = setInterval(() => {
                    setCurrentMessageIndex(prev => (prev + 1) % LOADING_MESSAGES[lang].length);
                }, 2500);

                return () => {
                    clearInterval(progressInterval);
                    clearInterval(messageInterval);
                };
            }, [loading, lang]);

            const fetchRecommendations = useCallback(async () => {
                setLoading(true);
                setErrorMessage('');
                setStep(Step.RECOMMENDATION);

                track('recommendation_start', {
                    purpose: selection.purpose,
                    companion: selection.companion,
                    interests: selection.interests.join('|'),
                    preference: selection.preference
                });

                const result = await getRecommendations(selection, storeList, lang);
                if (result.error) {
                    setRecommendations([]);
                    setErrorMessage(result.error);
                    track('recommendation_error', {
                        error_message: String(result.error).slice(0, 100)
                    });
                } else {
                    setRecommendations(result.data);
                    track('recommendation_complete', {
                        result_count: result.data.length,
                        purpose: selection.purpose,
                        companion: selection.companion,
                        interests: selection.interests.join('|'),
                        preference: selection.preference
                    });
                }
                setLoading(false);
            }, [selection, storeList, lang]);

            // Rendering helpers
            const renderLanding = () => (
                <div className="flex flex-col pb-8">
                    <div className="-mx-6 relative">
                        <LandingCarousel />
                    </div>

                    <div className="flex justify-end mt-4">
                        <button 
                            onClick={() => setIsGuideOpen(true)}
                            className="bg-white border border-[#D9CDB8] text-[#9A7D58] text-[15px] font-bold px-5 py-2.5 rounded-full flex items-center gap-1 active:scale-95 transition-transform"
                        >
                            엽전 도시락 이용방법
                            <svg className="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>

                    <div className="space-y-3 mt-12 mb-10 text-center flex flex-col items-center">
                        <h2 className="text-[24px] text-gray-900 whitespace-pre-wrap leading-tight" style={{ fontFamily: 'Jandari', fontWeight: 'normal' }}>{t.landingTitle}</h2>
                        <p className="text-gray-500 text-[15px]">{t.landingDesc}</p>
                    </div>

                    <div className="flex gap-4">
                        <button
                            onClick={() => {
                                track('landing_cta_click', {
                                    cta_name: 'map',
                                    entry_type: 'direct_map'
                                });
                                window.location.href = `map.html`;
                            }}
                            className="flex-1 py-4 bg-[#EBE5DB] text-[#7A6A58] font-bold text-[17px] rounded-2xl active:scale-[0.98] transition-all relative overflow-hidden"
                        >
                            {t.btnMap}
                        </button>
                        <button 
                            onClick={() => {
                                track('landing_cta_click', {
                                    cta_name: 'recommendation',
                                    entry_type: 'recommendation_flow'
                                });
                                handleNext();
                            }} 
                            className="flex-1 py-4 bg-[#b5926b] text-white font-bold text-[17px] rounded-2xl shadow-sm active:scale-[0.98] transition-all relative overflow-hidden"
                        >
                            {t.btnRec}
                        </button>
                    </div>
                </div>
            );

            const renderStep1 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step1Title}</h2>
                        <p className="text-gray-500 text-base">{t.step1Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step1Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.purpose === item.label} onClick={() => updateSelection('purpose', item.label)}>
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={!selection.purpose} label={t.next} />
                </div>
            );

            const renderStep2 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step2Title}</h2>
                        <p className="text-gray-500 text-base">{t.step2Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step2Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.companion === item.label} onClick={() => updateSelection('companion', item.label)}>
                                <div className={`mb-2 ${item.color || 'text-[#A68A64]'}`}>
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={!selection.companion} label={t.next} />
                </div>
            );

            const renderStep3 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 whitespace-pre-wrap leading-tight">{t.step3Title}</h2>
                        <p className="text-gray-500 text-base">{t.step3Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step3Opts.map((item) => (
                            <SelectionButton key={item.label} selected={selection.interests.includes(item.label)} onClick={() => handleInterestToggle(item.label)} className="aspect-[4/3]">
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                    <NextButton onClick={handleNext} disabled={selection.interests.length === 0} label={t.next} />
                </div>
            );

            const renderStep4 = () => (
                <div className="py-6 space-y-8">
                    <div>
                        <h2 className="text-2xl font-normal text-gray-900 mb-2 leading-tight">{t.step4Title}</h2>
                        <p className="text-gray-500 text-base">{t.step4Desc}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {t.step4Opts.map((item) => (
                            <SelectionButton key={item.id} selected={selection.preference === item.id} onClick={() => { updateSelection('preference', item.id); fetchRecommendations(); }}>
                                <div className="mb-2 text-[#A68A64]">
                                    <item.Icon className="w-6 h-6" strokeWidth={3} />
                                </div>
                                <span className="font-bold text-lg text-center leading-tight">{item.label}</span>
                            </SelectionButton>
                        ))}
                    </div>
                </div>
            );

            const renderRecommendation = () => {
                if (loading) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center px-6">
                            <div className="w-full max-w-[240px] mb-8 relative">
                                <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div
                                        className="h-full bg-[#A68A64] transition-all duration-500 ease-out"
                                        style={{ width: `${progress}%` }}
                                    ></div>
                                </div>
                                <p className="text-right text-xs text-[#A68A64] font-bold mt-2">{Math.round(progress)}%</p>
                            </div>
                            <h3 className="text-xl font-bold text-gray-800 mb-2 text-center animate-pulse">
                                {LOADING_MESSAGES[lang][currentMessageIndex]}
                            </h3>
                        </div>
                    );
                }

                if (errorMessage) {
                    return (
                        <div className="h-full flex flex-col items-center justify-center space-y-4 text-center px-6">
                            <p className="text-gray-600">{t.recError}</p>
                            <button
                                onClick={fetchRecommendations}
                                className="px-5 py-2.5 rounded-lg bg-[#A68A64] text-white text-sm font-medium"
                            >
                                {t.recRetry}
                            </button>
                            {errorMessage && (
                                <div className="mt-8 p-4 bg-red-50 rounded-2xl border border-red-100">
                                    <p className="text-red-600 text-sm font-bold mb-2">Error Details</p>
                                    <pre className="text-red-500 text-[10px] leading-tight whitespace-pre-wrap break-all font-mono opacity-80">{errorMessage}</pre>
                                    <button
                                        onClick={fetchRecommendations}
                                        className="mt-4 w-full py-3 bg-red-100 text-red-700 rounded-xl font-bold text-sm active:scale-95 transition-all"
                                    >
                                        {t.recRetry}
                                    </button>
                                </div>
                            )}
                        </div>
                    );
                }

                const handleOpenMap = () => {
                    const selectedStores = recommendations.filter((store) => store.checked);
                    const firstRec = recommendations[0];

                    track('recommendation_map_open', {
                        selected_count: selectedStores?.length || 0,
                        recommended_count: recommendations?.length || 0,
                        target_store: firstRec?.name || ''
                    });

                    // Auto-Favorites Logic
                    try {
                        const currentFavs = new Set(JSON.parse(localStorage.getItem('tongin_favs') || '[]'));
                        recommendations.forEach(r => currentFavs.add(r.name));
                        localStorage.setItem('tongin_favs', JSON.stringify(Array.from(currentFavs)));
                    } catch (e) { console.error("Auto-fav failed", e); }

                    if (selectedStores.length === 0) {
                        // No selection - show first recommendation
                        if (!firstRec) {
                            window.location.href = 'map.html';
                            return;
                        }
                        window.location.href = firstRec.slug ? `shop/${encodeURIComponent(firstRec.slug)}` : `map.html?open=${encodeURIComponent(firstRec.name)}`;
                    } else if (selectedStores.length === 1) {
                        // Single selection - open detail panel
                        const selected = selectedStores[0];
                        window.location.href = selected.slug ? `shop/${encodeURIComponent(selected.slug)}` : `map.html?open=${encodeURIComponent(selected.name)}`;
                    } else {
                        // Multiple selections - show all on map
                        const names = selectedStores.map(s => s.name).join(',');
                        window.location.href = `map.html?highlight=${encodeURIComponent(names)}`;
                    }
                };

                return (
                    <div className="pt-4 pb-48">
                        <h2 className="text-2xl font-normal text-gray-900 mb-10 whitespace-pre-wrap leading-tight">{t.recTitle}</h2>
                        <div className="space-y-4">
                            {recommendations.map((store) => (
                                <div
                                    key={store.id}
                                    className="p-4 border border-gray-200 rounded-xl flex items-start gap-3 bg-white hover:border-[#A68A64] transition-colors cursor-pointer"
                                    onClick={() => setRecommendations(prev => prev.map(s => s.id === store.id ? { ...s, checked: !s.checked } : s))}
                                >
                                    <div className={`mt-1 w-5 h-5 rounded border flex items-center justify-center flex-shrink-0 ${store.checked ? 'bg-[#A68A64] border-[#A68A64]' : 'border-gray-300'}`}>
                                        {store.checked && <div className="w-2.5 h-2.5 bg-white rounded-sm" />}
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-gray-800 text-lg mb-1">[{store.name}]</h3>
                                        <p className="text-sm text-gray-500 leading-relaxed">{store.description}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto bg-white px-6 pt-4 pb-[max(1.5rem,env(safe-area-inset-bottom))] border-t border-gray-50 space-y-3 z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                            <button
                                onClick={handleOpenMap}
                                className="w-full py-4 bg-[#A68A64] text-white rounded-2xl font-bold text-lg shadow-md active:scale-[0.98] transition-all"
                            >
                                {(() => {
                                    const selectedCount = recommendations.filter(r => r.checked).length;
                                    if (selectedCount === 0) return t.recMapBtn;
                                    if (selectedCount === 1) return t.recMapBtn;
                                    return `선택한 ${selectedCount}개 점포 지도에서 보기`;
                                })()}
                            </button>
                            <button onClick={handleReset} className="w-full py-4 text-gray-400 font-semibold text-sm hover:text-gray-600 transition-colors uppercase tracking-widest">{t.recResetBtn}</button>
                        </div>
                    </div>
                );
            };

            return (
                <Layout
                    step={step}
                    totalSteps={TOTAL_STEPS}
                    title={step === Step.LANDING ? t.title : undefined}
                    showProgress={step !== Step.LANDING && step !== Step.RECOMMENDATION}
                    lang={lang}
                    setLang={setLang}
                    onBack={handleBack}
                    showBackButton={step > Step.LANDING && step < Step.RECOMMENDATION}
                >
                    {step === Step.LANDING && renderLanding()}
                    {step === Step.PURPOSE && renderStep1()}
                    {step === Step.COMPANION && renderStep2()}
                    {step === Step.INTEREST && renderStep3()}
                    {step === Step.PREFERENCE && renderStep4()}
                    {step === Step.RECOMMENDATION && renderRecommendation()}
                    <GuideModal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} />
                </Layout>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
