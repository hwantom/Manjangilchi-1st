                    imageModal.classList.add('hidden');
                    modalImage.src = '';
                }, 300);
            };

            imgModalClose.onclick = closeImageModal;
            imageModal.onclick = (e) => {
                // Close if clicked on background
                if (e.target === imageModal) closeImageModal();
            };

            // --- Data Service Logic ---
            const fetchStores = async () => {
                try {
                    const res = await fetch(CSV_URL);
                    const text = await res.text();
                    const rawData = parseCSV(text);
                    stores = rawData
                        .map(normalizeRow)
                        .filter(s => s.name && s.lat && s.lng)
                        .filter(s => !EXCLUDED_STORE_KEYS.has(normalizeStoreKey(s.name)));
                } catch (error) { console.error("Data fetch failed", error); }
            };
            const parseCSV = (text) => {
                if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                const rows = text.split('\n').filter(line => line.trim());
                const parsedRows = rows.map(line => {
                    const parts = []; let current = ''; let inQuote = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') { inQuote = !inQuote; continue; }
                        if (char === ',' && !inQuote) { parts.push(current.trim()); current = ''; continue; }
                        current += char;
                    }
                    parts.push(current.trim());
                    return parts;
                });
                const header = parsedRows[0].map(h => h.replace(/\r/, '').trim());
                return parsedRows.slice(1).map(row => {
                    const obj = {};
                    header.forEach((h, i) => { obj[h] = row[i]; });
                    return obj;
                });
            };
            const normalizeRow = (r) => {
                const getVal = (row, keys) => {
                    for (const key of keys) {
                        const lowerKey = key.toLowerCase();
                        const actualKey = Object.keys(row).find(k => k.toLowerCase() === lowerKey);
                        if (actualKey && row[actualKey]) return row[actualKey].trim();
                    }
                    return "";
                };
                const rawCat = getVal(r, ['category', '분류']);
                let cat = "생활형";
                if (/식당/.test(rawCat)) cat = "식당";
                else if (/(간식|디저트|카페)/.test(rawCat)) cat = "간식";

                return {
                    name: getVal(r, ['name', '점포명']), name_en: getVal(r, ['name_eng', 'name_en']), name_zh: getVal(r, ['name_zh', 'name_cn']), name_ja: getVal(r, ['name_ja', 'name_jp']),
                    category: cat,
                    shortDesc: getVal(r, ['shortDesc', '설명']), shortDesc_en: getVal(r, ['shortDesc_en']), shortDesc_zh: getVal(r, ['shortDesc_zh']), shortDesc_ja: getVal(r, ['shortDesc_ja']),
                    reviewLink_Naver: getVal(r, ['reviewLink_Naver', '네이버']), reviewLink_Kakao: getVal(r, ['reviewLink_Kakao', '카카오']),
                    hours: getVal(r, ['hours', '영업시간']), hours_en: getVal(r, ['hours_en']), hours_zh: getVal(r, ['hours_zh']), hours_ja: getVal(r, ['hours_ja']),
                    repre_image: getVal(r, ['repre_image', 'image']),
                    price: getVal(r, ['price', '가격']), price_en: getVal(r, ['price_en']), price_zh: getVal(r, ['price_zh']), price_ja: getVal(r, ['price_ja']),
                    coin: getVal(r, ['coin', '엽전']).toLowerCase() === 'o' ? 'o' : '',
                    lat: getVal(r, ['lat', '위도']), lng: getVal(r, ['lng', '경도']),
                    menuLink: getVal(r, ['menuLink']),
                    keyword: getVal(r, ['keyword', '키워드']),
                };
            };

            // --- Core Application Logic ---
            const init = async () => {
                loadState();
                await loadGoogleMaps();
                await fetchStores();
                initMap();
                setupEventListeners();
                updateUI();
                initGeolocation();
                checkUrlParams();

                // Hide loading overlay with a slight delay for smooth feel
                setTimeout(() => {
                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');

                // Handle browser back button to close panels
                window.addEventListener('popstate', (event) => {

            const loadGoogleMaps = () => {
                return new Promise((resolve, reject) => {
                    if (window.google && window.google.maps) { resolve(); return; }
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${AppConfig.GOOGLE_MAPS_API_KEY}&libraries=maps,marker&v=beta&map_ids=${AppConfig.MAP_ID}`;
                    script.async = true;
                    script.defer = true;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
            };

            const checkUrlParams = () => {
                const params = new URLSearchParams(window.location.search);
                const openName = params.get('open');
                const highlightNames = params.get('highlight');

                if (openName) {
                    const store = stores.find(s => s.name === openName);
                    if (store) openDetailPanel(store);
                } else if (highlightNames) {
                    // Multiple shops to highlight
                    const names = highlightNames.split(',').map(n => n.trim());
                    const highlightStores = stores.filter(s => names.includes(s.name));
                    if (highlightStores.length > 0) {
                        // Add to favorites temporarily for highlighting
                        highlightStores.forEach(s => {
                            if (!favorites.has(s.name)) {
                                favorites.add(s.name);
                            }
                        });
                        updateMarkers();
                        updateFavCount();

                        // Fit map to show all highlighted stores
                        if (map && highlightStores.length > 0) {
                            const bounds = new google.maps.LatLngBounds();
                            highlightStores.forEach(store => {
                                bounds.extend(new google.maps.LatLng(parseFloat(store.lat), parseFloat(store.lng)));
                            });
                            map.fitBounds(bounds);
                            map.setHeading(-90);
                        }
                    }
                }
            };

            const loadState = () => {
                try {
                    const savedFavs = localStorage.getItem('tongin_favs');
                    if (savedFavs) {
                        favorites = new Set(JSON.parse(savedFavs));
                        favorites.forEach(name => {
                            if (EXCLUDED_STORE_KEYS.has(normalizeStoreKey(name))) {
                                favorites.delete(name);
                            }
                        });
                        localStorage.setItem('tongin_favs', JSON.stringify(Array.from(favorites)));
                    }
                    const savedLang = localStorage.getItem('tongin_lang');
                    if (savedLang) currentLang = savedLang;
                } catch { }
            };

            const setupEventListeners = () => {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    clearSearchBtn.classList.toggle('hidden', !searchQuery);
                    updateMarkers();
                });
                clearSearchBtn.onclick = () => {
                    searchInput.value = '';
                    searchQuery = '';
                    clearSearchBtn.classList.add('hidden');
                    updateMarkers();
                };
                langBtn.addEventListener('click', () => langMenu.classList.toggle('hidden'));
                favTrigger.addEventListener('click', () => openFavoritesPanel(true));
                overlay.addEventListener('click', closeAllPanels);
                locateMeBtn.addEventListener('click', handleLocateMe);
            };

            const updateUI = () => {
                renderFilters();
                renderLangMenu();
                updateMarkers();
                updateFavCount();
                searchInput.placeholder = UI_TRANSLATIONS[currentLang].searchPlaceholder;
            };

            const initGeolocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            updateUserMarker();
                        },
                        (err) => console.warn("Geolocation error:", err.message),
                        { enableHighAccuracy: true }
                    );
                }
            };

            const handleLocateMe = () => {
                if (userLocation && map) {
                    map.panTo(userLocation);
                    map.setZoom(19);
                } else {
                    initGeolocation(); // try again if not available
                }
            };

            // --- Map Logic ---
            const initMap = () => {
                if (!window.google) { setTimeout(initMap, 100); return; }
                map = new google.maps.Map(mapEl, {
                    center: MAP_CENTER, zoom: 19, mapId: '8fbca58624e4405a846adbea', heading: -90, tilt: 0,
                    disableDefaultUI: true, clickableIcons: false, gestureHandling: 'greedy'
                });
                createStoreMarkers();

                // Add zoom change listener for dynamic scaling
                map.addListener('zoom_changed', () => {
                    const zoomLevel = map.getZoom();
                    updateMarkerSizes(zoomLevel);
                });

                // Add heading change listener for dynamic label orientation
                map.addListener('heading_changed', () => {
                    updateLabelOrientation();
                });
                // Initial call
                updateLabelOrientation();
            };

            const createStoreMarkers = () => {
                stores.forEach(store => {
                    const container = document.createElement('div');
                    container.className = 'nmap-marker';
                    container.setAttribute('data-cat', store.category);

                    // Determine default label orientation (optimized for -90 heading)
                    const labelClass = STORES_WITH_LEFT_LABEL.has(store.name)
                        ? 'pos-left'
                        : (STORES_WITH_RIGHT_LABEL.has(store.name)
                            ? 'pos-right'
                            : (STORES_WITH_TOP_LABEL.has(store.name) ? 'pos-top' : ''));

                    container.setAttribute('data-default-class', labelClass);

                    container.innerHTML = `
                    <div class="fav-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.5 3c1.373 0 2.652.55 3.585 1.516.933-.966 2.212-1.516 3.585-1.516 2.786 0 5.25 2.322 5.25 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001z"/></svg></div>
                    <div class="glyph-container"><div class="glyph" style="background-image: url('${CATEGORY_STYLES[store.category].icon}')"></div></div>
                    <div class="shop-label ${labelClass}">${getStoreProp(store, 'name')}</div>
                `;

                    const marker = new google.maps.marker.AdvancedMarkerElement({
                        map,
                        position: { lat: parseFloat(store.lat), lng: parseFloat(store.lng) },
                        content: container,
                        title: store.name,
                        gmpClickable: true // Explicitly enable clicks for Advanced Markers
                    });

                    // Add robust click listener to the marker instance
                    marker.addListener('click', () => {
                        openDetailPanel(store);
                    });

                    // Explicitly handle label clicks as well for maximum reliability
                    const shopLabel = container.querySelector('.shop-label');
                    shopLabel.onclick = (e) => {
                        e.stopPropagation();
                        openDetailPanel(store);
                    };

                    markers.set(store.name, { marker, element: container, label: container.querySelector('.shop-label') });
                });
                updateMarkers();
            };

            const updateLabelOrientation = () => {
                if (!map) return;
                const heading = (map.getHeading() || 0);
                const h = heading < 0 ? heading + 360 : heading;

                // 4-Way Hysteresis Logic
                // We want to detect which quadrant we are primarily in:
                // West (270) [Initial]: 225-315.
                // East (90): 45-135.
                // South (180): 135-225.
                // North (0/360): 315-45.

                // Using a buffer of +/- 10 degrees at the transitions (45, 135, 225, 315)
                // Stable Zones:
                // North: [325, 360] U [0, 35]
                // East: [55, 125]
                // South: [145, 215]
                // West: [235, 305]

                let newMode = currentLabelMode;

                if ((h >= 325 && h <= 360) || (h >= 0 && h <= 35)) {
                    newMode = 'north';
                } else if (h >= 55 && h <= 125) {
                    newMode = 'east';
                } else if (h >= 145 && h <= 215) {
                    newMode = 'south';
                } else if (h >= 235 && h <= 305) {
                    newMode = 'west';
                }
                // Else: in buffer zone, keep current mode.
                // Initial fallback
                if (!currentLabelMode && !newMode) newMode = 'west';

                if (newMode === currentLabelMode) return;
                currentLabelMode = newMode;

                // Mapping Logic
                // Default (West): Left->Left, Right->Right, Top->Top
                // East (180 rotation): Swap Left/Right. Top->Top.
                // South: Left (South) -> Top. Right (North) -> Bottom.
                // North: Left (South) -> Bottom. Right (North) -> Top.

                markers.forEach(obj => {
                    const defaultClass = obj.element.getAttribute('data-default-class');
                    const labelEl = obj.label;

                    // Reset classes (keep base layout, remove positioning)
                    labelEl.classList.remove('pos-left', 'pos-right', 'pos-top');

                    // If no default class, we can't really orient it (it's center/bottom by default)
                    // But if it had one, we map it.
                    if (!defaultClass) return;

                    if (newMode === 'west') {
                        // Normal operations
                        labelEl.classList.add(defaultClass);
                    }
                    else if (newMode === 'east') {
                        // Invert Left/Right
                        if (defaultClass === 'pos-left') labelEl.classList.add('pos-right');
                        else if (defaultClass === 'pos-right') labelEl.classList.add('pos-left');
                        else if (defaultClass === 'pos-top') labelEl.classList.add('pos-top');
                    }
                    else if (newMode === 'south') {
                        // South Up -> Street Horizontal
                        // Left Stores (South) are Top. Right Stores (North) are Bottom.
                        if (defaultClass === 'pos-left') labelEl.classList.add('pos-top');
                        else if (defaultClass === 'pos-right') { /* Default is bottom */ }
                        else if (defaultClass === 'pos-top') labelEl.classList.add('pos-top'); // Keep top or force side? Stick to top.
                    }
                    else if (newMode === 'north') {
                        // North Up -> Street Horizontal
                        // Left Stores (South) are Bottom. Right Stores (North) are Top.
                        if (defaultClass === 'pos-left') { /* Default is bottom */ }
                        else if (defaultClass === 'pos-right') labelEl.classList.add('pos-top');
                        else if (defaultClass === 'pos-top') labelEl.classList.add('pos-top');
                    }
                });
            };

            const updateMarkerSizes = (zoomLevel) => {
                markers.forEach((obj) => {
                    // Scale markers based on zoom level
                    // Start small at initial zoom (19) to prevent overlap
                    // Grow larger when zooming in for better visibility
                    // zoom 21+: scale 1.4 (maximum zoom - very large)
                    // zoom 20: scale 1.2 (high zoom - large)
                    // zoom 19: scale 0.9 (INITIAL - smaller to avoid overlap)
                    // zoom 18: scale 0.8 (zoomed out - smaller)
                    // zoom 17: scale 0.7 (more zoomed out - very small)
                    // zoom 16-: scale 0.6 (far zoom - smallest)
                    let scale = 1.0;
                    if (zoomLevel >= 21) scale = 1.4;
                    else if (zoomLevel >= 20) scale = 1.2;
                    else if (zoomLevel >= 19) scale = 0.9;
                    else if (zoomLevel >= 18) scale = 0.8;
                    else if (zoomLevel >= 17) scale = 0.7;
                    else scale = 0.6;

                    obj.element.style.transform = `scale(${scale})`;

                    // Hide labels at lower zoom levels
                    if (zoomLevel < 17) {
                        obj.label.style.opacity = '0';
                    } else {
                        obj.label.style.opacity = '1';
                    }
                });
            };

            const updateMarkers = () => {
                const filteredStoreNames = getFilteredStoreNames();

                // Show/Hide markers
                markers.forEach((obj, name) => {
                    const store = stores.find(s => s.name === name);
                    const isVisible = filteredStoreNames.has(name);
                    const isSelected = selectedStore?.name === name;
                    const isFavorite = favorites.has(name);

                    obj.marker.map = isVisible ? map : null; // Set map to null to hide marker
                    obj.element.classList.toggle('active', isSelected);
                    obj.element.classList.toggle('is-favorite', isFavorite);
                    obj.label.innerText = getStoreProp(store, 'name');
                });

                // Show/Hide no results feedback
                if (noResults) {
                    noResults.classList.toggle('hidden', filteredStoreNames.size > 0);
                    const t = UI_TRANSLATIONS[currentLang];
                    document.getElementById('noResultsText').textContent = t.noResults || '검색 결과가 없습니다';
                }
            };

            window.clearAllFilters = () => {
                searchQuery = '';
                searchInput.value = '';
                clearSearchBtn.classList.add('hidden');
                activeCategories.clear();
                coinFilter = false;
                favoritesFilter = false;
                renderFilters();
                updateMarkers();
            };

            const updateUserMarker = () => {
                if (!map || !userLocation) return;
                if (userMarker) {
                    userMarker.setPosition(userLocation);
                } else {
                    userMarker = new google.maps.Marker({
                        position: userLocation, map, title: 'Me', zIndex: 1000,
                        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#4285F4', fillOpacity: 1, strokeColor: '#FFFFFF', strokeWeight: 3 }
                    });
                }
            };

            const getFilteredStoreNames = () => {
                const query = searchQuery.toLowerCase();
                return new Set(stores.filter(store => {
                    if (favoritesFilter && !favorites.has(store.name)) return false;
                    if (activeCategories.size > 0 && !activeCategories.has(store.category)) return false;
                    if (coinFilter && store.coin !== 'o') return false;
                    if (query) {
                        const name = getStoreProp(store, 'name').toLowerCase();
                        const desc = getStoreProp(store, 'shortDesc').toLowerCase();
                        if (!name.includes(query) && !desc.includes(query) && !store.name.toLowerCase().includes(query)) return false;
                    }
                    return true;
                }).map(s => s.name));
            };

            // --- UI Rendering ---
            const renderFilters = () => {
                const t = UI_TRANSLATIONS[currentLang];
                const cats = ['식당', '간식', '생활형'];

                // Category color filters for icons
                const colorFilters = {
                    '식당': 'brightness(0) saturate(100%) invert(82%) sepia(13%) saturate(1067%) hue-rotate(313deg) brightness(99%) contrast(94%)',
                    '간식': 'brightness(0) saturate(100%) invert(88%) sepia(28%) saturate(666%) hue-rotate(344deg) brightness(104%) contrast(93%)',
                    '생활형': 'brightness(0) saturate(100%) invert(86%) sepia(11%) saturate(1074%) hue-rotate(100deg) brightness(93%) contrast(86%)',
                    '엽전': 'brightness(0) saturate(100%) invert(65%) sepia(85%) saturate(2593%) hue-rotate(346deg) brightness(101%) contrast(101%)'
                };

                let html = `
                <button data-filter="coin" class="chip-btn whitespace-nowrap px-5 py-2.5 rounded-full text-[13px] font-black shadow-md transition-all border border-gray-100 ${coinFilter ? 'bg-brand-coin text-white' : 'bg-white text-gray-900'}">
                    <img src="${CATEGORY_STYLES['엽전'].icon}" class="w-4 h-4" style="filter: ${coinFilter ? 'brightness(0) invert(1)' : colorFilters['엽전']}" />
                    <span class="chip-label">${t.cat_coin}</span>
                </button>`;

                if (favorites.size > 0) {
                    html += `
                    <button data-filter="fav" class="chip-btn whitespace-nowrap px-5 py-2.5 rounded-full text-[13px] font-black shadow-md transition-all border border-gray-100 ${favoritesFilter ? 'bg-pink-500 text-white' : 'bg-white text-gray-900'}">
                        <svg class="w-4 h-4 ${favoritesFilter ? 'text-white' : 'text-pink-500'}" fill="${favoritesFilter ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        <span class="chip-label">${t.favoritesTitle}</span>
                    </button>`;
                }

                cats.forEach(cat => {
                    const isActive = activeCategories.has(cat);
                    const style = CATEGORY_STYLES[cat];
                    const catKey = cat === '식당' ? 'food' : cat === '간식' ? 'snack' : 'life';
                    html += `
                    <button data-filter-cat="${cat}" class="chip-btn whitespace-nowrap px-5 py-2.5 rounded-full text-[13px] font-black shadow-md transition-all border border-gray-100 ${isActive ? style.bg + ' text-white' : 'bg-white text-gray-900'}">
                        <img src="${style.icon}" class="w-4 h-4" style="filter: ${isActive ? 'brightness(0) invert(1)' : colorFilters[cat]}" />
                        <span class="chip-label">${t['cat_' + catKey]}</span>
                    </button>`;
                });
                filtersContainer.innerHTML = html;
                filtersContainer.querySelectorAll('button').forEach(btn => {
                    btn.onclick = () => {
                        const cat = btn.dataset.filterCat;
                        if (cat) {
                            activeCategories.has(cat) ? activeCategories.delete(cat) : activeCategories.add(cat);
                        } else if (btn.dataset.filter === 'coin') {
                            coinFilter = !coinFilter;
                        } else if (btn.dataset.filter === 'fav') {
                            favoritesFilter = !favoritesFilter;
                        }
                        renderFilters();
                        updateMarkers();
                    };
                });
            };

            const renderLangMenu = () => {
                const langLabels = { ko: '한국어', en: 'English', zh: '中文', ja: '日本語' };
                langMenu.innerHTML = Object.entries(langLabels).map(([code, label]) => `
                <button data-lang="${code}" class="w-full text-left px-4 py-2.5 text-xs font-bold hover:bg-gray-50 transition-colors ${currentLang === code ? 'text-brand-ink bg-gray-50' : 'text-gray-400'}">${label}</button>
            `).join('');
                langMenu.querySelectorAll('button').forEach(btn => {
                    btn.onclick = () => {
                        currentLang = btn.dataset.lang;
                        localStorage.setItem('tongin_lang', currentLang);
                        langMenu.classList.add('hidden');
                        updateUI();
                        if (selectedStore) openDetailPanel(selectedStore);
                        if (!favoritesPanel.classList.contains('hidden-panel-left')) renderFavoritesPanel();
                    }
                });
            };

            const updateFavCount = () => {
                if (favorites.size > 0) {
                    favCount.textContent = favorites.size;
                    favCount.classList.remove('hidden');
                    favTrigger.classList.add('text-pink-500', 'bg-pink-50');
                } else {
                    favCount.classList.add('hidden');
                    favTrigger.classList.remove('text-pink-500', 'bg-pink-50');
                }
            };



            // --- Legend Logic ---
            const toggleLegend = () => {
                legendPanel.classList.toggle('collapsed');
            };

            const renderLegend = () => {
                const t = UI_TRANSLATIONS[currentLang];
                legendTitle.textContent = t.legendTitle || '범례';

                const categories = [
                    { key: '식당', label: t.cat_food, style: CATEGORY_STYLES['식당'] },
                    { key: '간식', label: t.cat_snack, style: CATEGORY_STYLES['간식'] },
                    { key: '생활형', label: t.cat_life, style: CATEGORY_STYLES['생활형'] },
                    { key: '엽전', label: t.cat_coin, style: CATEGORY_STYLES['엽전'] }
                ];

                legendContent.innerHTML = categories.map(cat => `
                    <div class="legend-item">
                        <div class="legend-icon ${cat.style.bg}">
                            <img src="${cat.style.icon}" alt="${cat.label}" />
                        </div>
                        <span class="legend-label">${cat.label}</span>
                    </div>
                `).join('');
            };

            const closeAllPanelsInternal = () => {
                detailPanel.classList.add('hidden-panel-right');
                favoritesPanel.classList.add('hidden-panel-left');
                overlay.classList.add('hidden');
                selectedStore = null;
                updateMarkers();
            };

            const closeAllPanels = () => {
                if (window.history.state && window.history.state.panelOpen) {
                    window.history.back();
                } else {
                    closeAllPanelsInternal();
                }
            };

            // --- Detail Panel ---
            window.toggleHours = () => {
                const table = document.getElementById('hoursTable');
                const btn = document.getElementById('hoursToggleBtn');
                if (table) table.classList.toggle('hidden');
                if (btn) btn.classList.toggle('active');
            };

            const getOperatingStatus = (hoursStr) => {
                const t = UI_TRANSLATIONS[currentLang];
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const dayIdx = now.getDay();

                const statusStr = getDayOperatingStatus(hoursStr, dayIdx, true);

                if (statusStr === '휴무' || statusStr === '휴무 중') {
                    return { label: '휴무', color: 'closed', detail: '오늘 정기 휴무' };
                }

                if (statusStr === '24시간 영업' || statusStr === '00:00–24:00') {
                    return { label: '영업 중', color: 'open', detail: '24시간 영업 중' };
                }

                const timeMatch = statusStr.match(/(\d{1,2}:\d{2})\s*[~-–—]\s*(\d{1,2}:\d{2})/);
                if (timeMatch) {
                    const [_, openStr, closeStr] = timeMatch;
                    const [openH, openM] = openStr.split(':').map(Number);
                    const [closeH, closeM] = closeStr.split(':').map(Number);
                    const openMinutes = openH * 60 + openM;
                    const closeMinutes = closeH * 60 + closeM;

                    let normalizedClose = closeMinutes;
                    if (closeMinutes <= openMinutes) normalizedClose += 1440;

                    if (currentMinutes >= openMinutes && currentMinutes < normalizedClose) {
                        // Check for break time in the raw string
                        const breakMatch = hoursStr.match(/브레이크타임\s*(\d{1,2}:\d{2})\s*[~-–—]\s*(\d{1,2}:\d{2})/);
                        if (breakMatch) {
                            const [_, bo, bc] = breakMatch;
                            const bOpen = bo.split(':').map(Number)[0] * 60 + bo.split(':').map(Number)[1];
                            const bClose = bc.split(':').map(Number)[0] * 60 + bc.split(':').map(Number)[1];
                            if (currentMinutes >= bOpen && currentMinutes < bClose) {
                                return { label: '브레이크타임', color: 'break', detail: `${bc}에 영업 재개` };
                            }
                        }
                        return { label: '영업 중', color: 'open', detail: `${closeStr}에 영업 종료` };
                    } else if (currentMinutes < openMinutes) {
                        return { label: '영업 종료', color: 'ended', detail: `${openStr}에 영업 시작` };
                    } else {
                        return { label: '영업 종료', color: 'ended', detail: '오늘 영업 종료' };
                    }
                }

                return { label: '영업 중', color: 'open', detail: '영업 시간 확인 필요' };
            };

            const getDayOperatingStatus = (hoursStr, dayIdx, checkNthHoliday = false) => {
                if (!hoursStr) return '정보 없음';
                const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
                const targetDayName = dayNames[dayIdx];

                // 1. Nth week holiday check (e.g. "매달 3번째 일요일")
                if (checkNthHoliday) {
                    const nthMatch = hoursStr.match(/매달\s*(\d)번째\s*([일월화수목금토])요일/);
                    if (nthMatch) {
                        const nth = parseInt(nthMatch[1]);
                        const hDayName = nthMatch[2];
                        if (targetDayName === hDayName) {
                            const today = new Date();
                            if (Math.ceil(today.getDate() / 7) === nth) return '휴무';
                        }
                    }
                }

                const segments = hoursStr.split('/').map(s => s.trim());

                for (const segment of segments) {

                    // a. Extract Ranges (e.g. 월-수)
                    const rangeRegex = /([일월화수목금토])\s*[~-–—]\s*([일월화수목금토])/g;
                    let m;
                    while ((m = rangeRegex.exec(segment)) !== null) {
                        const start = dayNames.indexOf(m[1]);
                        const end = dayNames.indexOf(m[2]);
                        if (start <= end) {
                            for (let i = start; i <= end; i++) daysInSegment.add(i);
                        } else {
                            for (let i = start; i <= 6; i++) daysInSegment.add(i);
                            for (let i = 0; i <= end; i++) daysInSegment.add(i);
                        }
                    }

                    // b. Extract Standalone Days (excluding those already in range)

                        if (segment.includes(name) && !daysInSegment.has(idx)) {
                            // Check if it's not part of a larger word or range (heuristic)

                            const nextChar = segment[segment.indexOf(name) + name.length];
                            if (!/[~-–—]/.test(prevChar) && !/[~-–—]/.test(nextChar)) {

                            }
                        }

                            if (timeMatch) resultTime = timeMatch[0];
                            else if (is24h) resultTime = "24시간 영업";
                        }
                    }
                }

                if (isHoliday) return '휴무';
                return resultTime || '휴무';

                    <button id="favCloseBtn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 no-scrollbar">${content}</div>`;

                document.getElementById('favCloseBtn').onclick = () => openFavoritesPanel(false);
                favoritesPanel.querySelectorAll('.fav-item').forEach(item => {
                    item.onclick = () => {
                        const store = stores.find(s => s.name === item.dataset.storeName);
                        if (store) openDetailPanel(store);
                    };
                });
                favoritesPanel.querySelectorAll('[data-remove-fav]').forEach(btn => {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        toggleFavorite(btn.dataset.removeFav);
                    };
                });

                // Show All Favorites on Map button
                const showAllBtn = document.getElementById('showAllFavsBtn');
                if (showAllBtn) {
                    showAllBtn.onclick = () => {
                        if (favStores.length > 0 && map) {
                            openFavoritesPanel(false);
                            const bounds = new google.maps.LatLngBounds();
                            favStores.forEach(store => {
                                bounds.extend(new google.maps.LatLng(parseFloat(store.lat), parseFloat(store.lng)));
                            });
                            map.fitBounds(bounds);
                            map.setHeading(-90);
                        }
                    };
                }
            };

            // --- Helper Functions ---
            const toggleFavorite = (storeName) => {
                favorites.has(storeName) ? favorites.delete(storeName) : favorites.add(storeName);
                if (!favorites.has(storeName) && favorites.size === 0) favoritesFilter = false;

                localStorage.setItem('tongin_favs', JSON.stringify(Array.from(favorites)));
                updateFavCount();
                renderFilters();
                updateMarkers();
                if (selectedStore?.name === storeName) renderDetailPanel();
                if (!favoritesPanel.classList.contains('hidden-panel-left')) renderFavoritesPanel();
            };

            const normalizeImageUrl = (u) => {
                if (!u) return PLACEHOLDER_IMG;
                if (u.includes('drive.google.com')) {
                    const id = u.match(/\/file\/d\/([^/]+)/)?.[1] || new URL(u).searchParams.get('id');
                    return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w800` : u;
                }
                return u;
            };

            const parseKeywords = (raw) => {
                if (!raw) return [];
                return raw.split(/\s+/).map(k => k.trim()).filter(Boolean);
            };

            const getStoreProp = (store, prop) => {
                if (!store) return '';
                const langMap = { 'name': true, 'shortDesc': true, 'hours': true, 'price': true };
                if (langMap[prop]) {
                    const langProp = `${prop}_${currentLang}`;
                    return store[langProp] || store[prop] || "-";
                }
                return store[prop] || '';
            };

            init();
        });
    </script>
</body>
